# shorproof — GitHub Actions example
#
# Scans your repo for quantum-vulnerable cryptography on every push and PR,
# uploads the results to GitHub code scanning (Security → Code scanning), and
# optionally fails the build when a high-or-worse finding appears.
#
# Copy this into .github/workflows/shorproof.yml and adjust as needed.

name: shorproof

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write   # required for the SARIF upload below

jobs:
  scan:
    name: Post-quantum readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Produce SARIF. Without --fail-on this always exits 0, so the upload
      # step below still runs even when findings exist.
      - name: Run shorproof
        run: npx shorproof@0.1 . --format sarif > shorproof.sarif

      # Findings appear inline on the PR and in the Security tab.
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: shorproof.sarif
          category: shorproof

      # Optional gate: fail the build on any high-or-worse finding.
      # Remove this step if you only want reporting, not enforcement.
      - name: Enforce threshold
        run: npx shorproof@0.1 . --fail-on high
